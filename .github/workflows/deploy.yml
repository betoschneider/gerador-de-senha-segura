name: 🚀 Deploy automático no servidor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 🚀 Deploy na pasta local existente
        run: |
          echo "📂 Acessando pasta do projeto..."
          cd /home/dev-host/projetos/gerador-de-senha-segura
          
          echo "⬇️ Atualizando código via Git..."
          # Garante que o git confie na pasta (segurança do git moderno)
          git config --global --add safe.directory /home/dev-host/projetos/gerador-de-senha-segura
          
          git fetch origin main
          git reset --hard origin/main
          
          echo "🐳 Recriando containers..."
          docker compose down --rmi local
          docker compose up -d --build
          docker image prune -f  
      
      - name: 🏥 Check Health
        run: docker ps | grep api-container